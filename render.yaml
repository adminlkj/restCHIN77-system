services:
  - type: web
    name: binaa-system
    env: node
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: binaa-postgres
          property: internalConnectionString

databases:
  - name: binaa-postgres
    databaseName: binaa
    user: binaa