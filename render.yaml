services:
  - type: web
    name: binaa-system
    env: node
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      # نستخدم connectionString (الخارجي) بدلاً من internalConnectionString.
      # الاسم الداخلي (dpg-xxx-a) قد لا يُحل عبر DNS إذا اختلفت منطقة الـ service
      # عن منطقة الـ DB، أو إذا أُعيد إنشاء الـ DB. الاسم الخارجي يعمل دائماً
      # عبر SSL من أي مكان، ويُفعّل db.js اتصال SSL تلقائياً لتقارير
      # databaseUrl.includes('.render.com').
      - key: DATABASE_URL
        fromDatabase:
          name: binaa-postgres
          property: connectionString

databases:
  - name: binaa-postgres
    databaseName: binaa
    user: binaa